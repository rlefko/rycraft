name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    name: Format (clang-format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          clang-format --version
          git ls-files '*.cpp' '*.hpp' '*.mm' ':!subprojects' \
            | xargs clang-format --dry-run --Werror

  build-test:
    name: Build & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja ccache

      - name: Ensure Metal toolchain
        run: |
          if ! xcrun metal --version >/dev/null 2>&1; then
            xcodebuild -downloadComponent MetalToolchain
          fi
          xcrun metal --version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('meson.build', 'src/**/meson.build') }}
          restore-keys: ccache-${{ runner.os }}-

      - name: Cache wrap downloads
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: wraps-${{ hashFiles('subprojects/*.wrap') }}

      - name: Setup build
        run: CC="ccache cc" CXX="ccache c++" OBJCXX="ccache c++" meson setup build

      - name: Compile
        run: ninja -C build

      - name: Run tests
        run: ninja -C build test

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-test-log
          path: build/meson-logs/testlog.txt

  lint:
    name: Lint (clang-tidy)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja llvm

      - name: Cache wrap downloads
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: wraps-${{ hashFiles('subprojects/*.wrap') }}

      - name: Setup build (generates compile_commands.json)
        run: meson setup build

      # clang-tidy runs against the compile database, so flags and the SDK
      # sysroot come from the real build. Only C++ translation units are
      # linted: Homebrew clang-tidy trips over Apple's Objective-C headers
      # in the .mm files, and headers are covered via HeaderFilterRegex.
      # Homebrew clang-tidy needs the SDK sysroot passed explicitly
      # (Apple clang finds it implicitly; LLVM's does not).
      - name: Run clang-tidy
        run: |
          SDK="$(xcrun --show-sdk-path)"
          git ls-files 'src/**/*.cpp' \
            | xargs -P "$(sysctl -n hw.ncpu)" -n 4 \
              "$(brew --prefix llvm)/bin/clang-tidy" -p build --quiet \
              --extra-arg=-isysroot --extra-arg="$SDK"

  codeql:
    name: CodeQL Analysis
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # CodeQL is licensed for public repositories and private repositories
      # with GitHub Code Security. Set RYCRAFT_CODEQL_ENABLED to true if Code
      # Security is enabled for this private repository.
      - name: Report CodeQL availability
        if: github.event.repository.private && vars.RYCRAFT_CODEQL_ENABLED != 'true'
        run: echo "CodeQL requires GitHub Code Security for private repositories"

      - uses: actions/checkout@v4
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'

      - name: Install dependencies
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'
        run: brew install meson ninja

      - name: Cache wrap downloads
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'
        uses: actions/cache@v4
        with:
          path: subprojects/packagecache
          key: wraps-${{ hashFiles('subprojects/*.wrap') }}

      - name: Initialize CodeQL
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Setup build
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'
        run: meson setup build

      - name: Compile
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'
        # CodeQL analyzes native C++ and Objective-C++ sources, not Metal
        # shading language. Static targets cover every production library
        # without linking CodeQL's traced objects to native-only dependencies.
        run: |
          ninja -C build \
            src/common/libcommon.a \
            src/engine/libengine.a \
            src/render/librender.a \
            src/world/libworld.a \
            src/entity/libentity.a \
            src/audio/libaudio.a

      - name: Perform CodeQL Analysis
        if: github.event.repository.private == false || vars.RYCRAFT_CODEQL_ENABLED == 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (clang-tidy)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja

      - name: Setup build
        run: meson setup build

      - name: Run clang-tidy
        run: |
          find src include -name '*.cpp' -o -name '*.hpp' | \
            xargs -I {} clang-tidy --config-file=.clang-tidy --build-dir=build {}

  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja

      - name: Setup build
        run: meson setup build

      - name: Compile
        run: ninja -C build

  test:
    name: Test
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja

      - name: Setup build
        run: meson setup build

      - name: Run tests
        run: ninja -C build test

  codeql:
    name: CodeQL Analysis
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install meson ninja

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Setup build
        run: meson setup build

      - name: Compile
        run: ninja -C build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

[binaries]
c = 'clang'
cpp = 'clang++'
objc = 'clang'
objcpp = 'clang++'
ar = 'ar'
strip = 'strip'

[host_machine]
system = 'darwin'
cpu_family = 'aarch64'
cpu = 'arm64'
endian = 'little'

[properties]
needs_exe_wrapper = true

[built-in options]
c_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
c_link_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
cpp_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
cpp_link_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
objc_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
objc_link_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
objcpp_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
objcpp_link_args = ['-arch', 'arm64', '-mmacosx-version-min=14.0']
